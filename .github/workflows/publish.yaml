---

name: "Publish"
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup Node"
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: "npm ci"
        run: npm ci

      - name: "Build"
        run: npm run build

      - name: "Linters"
        run: npm run lint

      - name: "Tests"
        run: npm run test

      - name: "Attach release assets"
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          gh release upload $TAG_NAME \
            dist/sepa.js \
            dist/sepa.min.js \
            dist/sepa.es5.cjs \
            dist/sepa.es5.min.cjs \
            dist/types/sepa.d.ts

      - name: "npm publish"
        run: npm publish --provenance
